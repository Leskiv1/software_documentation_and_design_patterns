{% extends "base.html" %}

{% block title %}Редагувати гру{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Редагувати: {{ game.title }}</h4>
            </div>
            <div class="card-body">
                <form action="/games/edit/{{ game.gameId }}" method="POST">
                    
                    <div class="mb-3">
                        <label for="title" class="form-label">Назва гри</label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ game.title }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="genre" class="form-label">Жанр</label>
                        <input type="text" class="form-control" id="genre" name="genre" value="{{ game.genre }}" required>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a href="/games" class="btn btn-outline-secondary">Скасувати</a>
                        <button type="submit" class="btn btn-primary">Зберегти зміни</button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
