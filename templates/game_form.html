{% extends "base.html" %}

{% block title %}Додати нову гру{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Додати нову гру</h4>
            </div>
            <div class="card-body">
                <form action="/games/new" method="POST">

                    <div class="mb-3">
                        <label for="title" class="form-label">Назва гри</label>
                        <input type="text" class="form-control" id="title" name="title" required placeholder="Наприклад: Cyberpunk 2077">
                    </div>

                    <div class="mb-3">
                        <label for="genre" class="form-label">Жанр</label>
                        <input type="text" class="form-control" id="genre" name="genre" required placeholder="Наприклад: RPG">
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="/games" class="btn btn-outline-secondary">Скасувати</a>
                        <button type="submit" class="btn btn-success">Зберегти гру</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
